name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Download Python
      run: |
        curl -L https://www.python.org/ftp/python/3.12.6/python-3.12.6-embed-amd64.zip -o python-embed.zip
        7z x python-embed.zip -opython
        del python-embed.zip
        
    - name: Build GUI
      run: dotnet publish src/gui/SkillFlowGUI.csproj -c Release -r win-x64
      
    - name: Package Portable
      run: |
        mkdir package
        copy src\gui\bin\Release\net10.0-windows\win-x64\publish\* package\
        xcopy /E /I python package\python\
        xcopy /E /I src\cli package\cli\
        
    - name: Create Zip
      run: |
        powershell Compress-Archive -Path package\* -DestinationPath "SkillFlow-portal-${{ github.ref_name }}-win-x64.zip"
        
    - name: List Output
      run: dir *.zip
        
    - name: Generate Release Notes
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy-MM-dd"
        $tag = "${{ github.ref_name }}"
        $zipFile = "SkillFlow-portal-$tag-win-x64.zip"
        $content = @"
# $tag

**Built on:** $date

## Installation

Download and extract, then run `SkillFlowGUI.exe`.

## Features

- Portable (no install)
- Bundled Python 3.12
- Automatic categorization

## Token Reduction

- Before: ~80k
- After: ~1.5k

---

*Auto-generated*
"@
        Set-Content release_notes.md $content
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: release_notes.md
        files: SkillFlow-portal-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
