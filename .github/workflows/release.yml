name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Download Python
      run: |
        curl -L https://www.python.org/ftp/python/3.12.6/python-3.12.6-embed-amd64.zip -o python-embed.zip
        7z x python-embed.zip -opython
        del python-embed.zip
        
    - name: Build GUI
      run: dotnet publish src/gui/SkillFlowGUI.csproj -c Release -r win-x64
      
    - name: Package Portable
      run: |
        mkdir package
        copy src\gui\bin\Release\net10.0-windows\win-x64\publish\* package\
        xcopy /E /I python package\python\
        xcopy /E /I src\cli package\cli\
        
    - name: Create Zip
      run: |
        powershell Compress-Archive -Path package\* -DestinationPath "SkillFlow-portable-$env:GITHUB_REF_NAME-win-x64.zip"
        
    - name: List Output
      run: dir *.zip
      
    - name: Generate Release Notes
      run: |
        echo # ${{ github.ref_name }} > release_notes.md
        echo. >> release_notes.md
        echo Built on: %DATE% >> release_notes.md
        echo. >> release_notes.md
        echo Portable package for Windows. >> release_notes.md
        echo Download, extract, run SkillFlowGUI.exe. >> release_notes.md
        echo. >> release_notes.md
        echo Token reduction: ~~98%>> release_notes.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: release_notes.md
        files: SkillFlow-portable-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
