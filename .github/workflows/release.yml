name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Download Python
      run: |
        curl -L https://www.python.org/ftp/python/3.12.6/python-3.12.6-embed-amd64.zip -o python-embed.zip
        7z x python-embed.zip -opython
        del python-embed.zip
        
    - name: Build GUI
      run: dotnet publish src/gui/SkillFlowGUI.csproj -c Release -r win-x64
      
    - name: Prepare Portable Package
      run: |
        mkdir dist
        copy src\gui\bin\Release\net10.0-windows\win-x64\publish\* dist\
        xcopy /E /I python dist\python\
        xcopy /E /I src\cli dist\cli\
        
    - name: Create Zip
      run: |
        powershell Compress-Archive -Path dist/* -DestinationPath "SkillFlow-portable-${{ github.ref_name }}-win-x64.zip" -Force
        
    - name: Generate Release Notes
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy-MM-dd HH:mm"
        $tag = "${{ github.ref_name }}"
        $zipFile = "SkillFlow-portable-$tag-win-x64.zip"
        $lines = @(
          "# $tag"
          ""
          "**Built on:** $date"
          ""
          "## Installation"
          ""
          "### Portable (Recommended)"
          ""
          "1. Download `$zipFile`"
          "2. Extract anywhere"
          "3. Run `SkillFlowGUI.exe` (no installation required)"
          ""
          "## What's New"
          ""
          "- Automatic release via GitHub Actions"
          "- Portable Python bundled"
          "- One-click GUI"
          ""
          "## Token Reduction"
          ""
          "- Before: ~80,000 tokens"
          "- After: ~1,500 tokens"
          "- Reduction: ~98%"
          ""
          "## Reverting"
          ""
          "```bash"
          "python setup.py --revert"
          "```"
          ""
          "## Testing"
          ""
          "```bash"
          "python test_skillflow.py"
          "```"
          ""
          "---"
          ""
          "*Generated by GitHub Actions*"
        )
        $lines -join "`n" | Set-Content -Path release_notes.md -Encoding UTF8
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: release_notes.md
        files: SkillFlow-portable-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
